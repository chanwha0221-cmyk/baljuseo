async function getAccessToken(){
  const header={alg:'RS256',typ:'JWT'};
  const now=Math.floor(Date.now()/1000);
  const claim={iss:CLIENT_EMAIL,scope:'https://www.googleapis.com/auth/spreadsheets',aud:'https://oauth2.googleapis.com/token',exp:now+3600,iat:now};
  const enc=(obj)=>btoa(JSON.stringify(obj)).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
  const toSign=enc(header)+'.'+enc(claim);
  const pem=PRIVATE_KEY.replace(/-----BEGIN PRIVATE KEY-----|-----END PRIVATE KEY-----|\n/g,'');
  const bin=Uint8Array.from(atob(pem),c=>c.charCodeAt(0));
  const key=await crypto.subtle.importKey('pkcs8',bin,{name:'RSASSA-PKCS1-v1_5',hash:'SHA-256'},false,['sign']);
  const sig=await crypto.subtle.sign('RSASSA-PKCS1-v1_5',key,new TextEncoder().encode(toSign));
  const jwt=toSign+'.'+btoa(String.fromCharCode(...new Uint8Array(sig))).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
  const res=await fetch('https://oauth2.googleapis.com/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:`grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=${jwt}`});
  const d=await res.json();
  return d.access_token;
}

async function saveToSheet(){
  const val=document.getElementById('out').value.trim();
  if(!val){sl('출력 데이터가 없습니다.','warn');return;}
  sl('시트에 저장 중...');
  try{
    const token=await getAccessToken();
    // E열(번호 포함) 기준으로 마지막 행 찾기 - 최소 8행(헤더 7행 아래)부터 시작
    const rRes=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(SHEET_NAME)}!E:E`,{headers:{'Authorization':`Bearer ${token}`}});
    const rData=await rRes.json();
    const lastRow=rData.values?rData.values.length:0;
    const nextRow=Math.max(lastRow+1, 8); // 최소 8행
    // 데이터 파싱 및 열 결정
    const lines=val.split('\n').filter(l=>l.trim());
    const rows=lines.map(l=>{
      const cols=l.split('\t');
      // 10칸(insert 있음): E열부터 = 5번째 열
      // 9칸(insert 없음): F열부터 = 6번째 열
      // cols 길이로 판단: 10칸이면 E열, 9칸이면 F열
      return cols;
    });
    // 첫 행 칸수로 시작 열 결정
    const firstCols=rows[0]?rows[0].length:9;
    const startCol=firstCols>=10?'E':'F';
    const range=`${SHEET_NAME}!${startCol}${nextRow}`;
    const wRes=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(range)}?valueInputOption=RAW`,{method:'PUT',headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'},body:JSON.stringify({values:rows})});
    const wData=await wRes.json();
    if(wData.updatedCells){
      // 가운데 정렬 적용
      const sheetId = 1932703059; // 당일 탭 sheetId
      const endRow = nextRow + rows.length;
      const startColIdx = firstCols>=10 ? 4 : 5; // E=4, F=5
      const endColIdx = startColIdx + firstCols;
      await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}:batchUpdate`,{
        method:'POST',
        headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'},
        body:JSON.stringify({requests:[{repeatCell:{range:{sheetId,startRowIndex:nextRow-1,endRowIndex:endRow-1,startColumnIndex:startColIdx,endColumnIndex:endColIdx},cell:{userEnteredFormat:{horizontalAlignment:'CENTER',verticalAlignment:'MIDDLE'}},fields:'userEnteredFormat(horizontalAlignment,verticalAlignment)'}}]})
      });
      sl('시트 저장 완료! '+wData.updatedRows+'행 추가됨','ok');
    }
    else{sl('저장 실패: '+JSON.stringify(wData),'warn');}
  }catch(e){sl('오류: '+e.message,'warn');}
}

function fp(t){
  if(!t)return"";
  const n=String(t).replace(/[^0-9]/g,'');
  if(!n)return"";
  if(n.length===12&&n.startsWith('050'))return n.slice(0,4)+'-'+n.slice(4,8)+'-'+n.slice(8);
  if(n.length===8&&n.startsWith('1'))return n.slice(0,4)+'-'+n.slice(4);
  if(n.length>=10){
    if(n.startsWith('02'))return n.slice(0,2)+'-'+n.slice(2,6)+'-'+n.slice(6);
    if(n.startsWith('0'))return n.slice(0,3)+'-'+n.slice(3,7)+'-'+n.slice(7);
    return n.slice(0,3)+'-'+n.slice(3,7)+'-'+n.slice(7);
  }
  return n;
}

function ca(a){
  if(!a)return"";
  if(a.includes(RA))a=a.replace(RA,"").replace("(천곡동)","").trim();
  return a.replace("출고지주소","").replace(/\//g," ").trim();

function isKnownClient(s){return !!CC[s.replace(/\s+/g,'')];}

function isHeaderRow(line){
  const first=line.split('\t')[0].trim();
  return HEADER_KEYWORDS.some(k=>first.includes(k));
}

// 줄 첫 컬럼이 새로운 발주 시작인지 판단
// - 등록된 업체명이면 무조건 새 행
// - 미등록이라도 이전 행 첫 컬럼과 같은 값이 반복되면 새 행 (같은 업체가 여러 발주)
// - 이전 행 첫 컬럼과 다르고 미등록이면 이전 행의 연장(줄바꿈)으로 간주
function mergeLines(raw){
  const lines=raw.split('\n');
  const merged=[];
  let lastClient='';
  for(const line of lines){
    const trimmed=line.trim();
    if(!trimmed)continue;
    if(isHeaderRow(trimmed)){sl('헤더 행 제거됨','');continue;}
    // 전처리: 각 컬럼 앞 . 제거, k단위→kg 변환
    const preprocessed=trimmed.split('\t').map(c=>c.trim().replace(/^\.\s*/,'').replace(/(\d+)k\b/g,'$1kg')).join('\t');
    const firstCol=preprocessed.split('\t')[0].trim().replace(/\s+/g,'');
    const isNew = isKnownClient(firstCol) || firstCol===lastClient;
    if(merged.length===0||isNew){
      merged.push(preprocessed);
      if(firstCol) lastClient=firstCol;
    } else {
      merged[merged.length-1]=merged[merged.length-1]+'\t'+preprocessed;
    }
  }
  return merged;
}

function pp(cl,pr,qty){
  let r=pr.replace(/\*/g,'x');
  if(r.includes('+')){const it=r.split('+').map(i=>i.trim());return{name:it.map(i=>/[x×]\s*\d+/.test(i)?i:i+' x 1').join(' / '),qty,maxB:999};}
  if(r.includes('/')){const pt=r.split('/').map(s=>s.trim()).filter(Boolean);if(pt.length>1)return{name:pt.map(i=>/[x×]\s*\d+/.test(i)?i:i+' x 1').join(' / '),qty,maxB:999};r=pt[0];}
  const qm=r.match(/\s*[x×]\s*(\d+)$/);let cn=r;
  if(qm){qty=parseInt(qm[1]);cn=r.slice(0,qm.index).trim();}
  cn=cn.replace(/\[마스터\]/g,'').replace('연안명게','연안 멍게').replace('난간','난각').replace(/(\d+)[kK]\b/g,'$1kg').trim();
  if(cn.includes('자연산 급냉 대구'))cn='급냉 국내산 대구 1.5kg';
  if(cn.includes('급냉 참치 오마카세 한판'))cn='참치 오마카세 한판';
  if(cl==='신선한아침'&&cn.includes('노르웨이 생연어'))cn='연안 생연어';
  if(cn.includes('유정란')){const em=cn.match(/(\d+)\s*[구알]/);const en=em?em[1]:'';if(cn.includes('1번'))return{name:'자연방사 난각 1번 유정란 '+en+'구',qty,maxB:999};if(cn.includes('2번'))return{name:'동물복지 난각 2번 유정란 '+en+'구',qty,maxB:999};}
  if(cl==='아크미소프트'&&cn.includes('홍어'))cn='아 '+cn;
  const wm=cn.match(/(\d+)kg/);const wi=wm?parseInt(wm[1]):1;
  const pn=qm?cn:cn.replace(/[x×]\s*[\d.]+/g,'').trim();
  if(cl==='대상수산'){
    if(norm(pn).includes('호래기'))return{name:'횟감 대짜 호래기 500g',qty:qty*wi*2,maxB:999};
    if(norm(pn).includes('참소라'))return{name:'연안 주먹참소라 1kg',qty:qty*wi,maxB:999};
    if(norm(pn).includes('주꾸미')||norm(pn).includes('쭈꾸미'))return{name:'연안 활 주꾸미 1kg',qty:qty*wi,maxB:999};
    if(norm(pn).includes('전복'))return{name:'연안 오육미전복 1kg',qty:qty*wi,maxB:999};
    if(norm(pn).includes('멍게'))return{name:'향긋 깐 멍게 500g',qty:qty*wi*2,maxB:999};
    if(norm(pn).includes('홍가리비'))return{name:'활 홍가리비 1kg',qty:qty*wi,maxB:999};
    if(norm(pn).includes('바지락')&&!norm(pn).includes('깐'))return{name:'왕 바지락 1kg',qty:qty*wi,maxB:999};
    if(norm(pn).includes('바지락살')||(norm(pn).includes('깐')&&norm(pn).includes('바지락')))return{name:'깐 바지락 500g',qty:qty*wi*2,maxB:999};
  }
  if(norm(pn).includes('홍가리비'))return{name:'활 홍가리비 1kg',qty,maxB:999};
  if(norm(pn).includes('생굴')&&!norm(pn).includes('kg'))return{name:'생굴 1kg',qty,maxB:999};
  if(norm(pn).includes('꼼장어'))return{name:'생물 꼼장어 1kg',qty,maxB:999};
  if(norm(pn).includes('염소탕'))return{name:'김대헌 장수 염소탕 1팩',qty,maxB:999};
  if(norm(pn).includes('자반')&&norm(pn).includes('고등어'))return{name:'국내산 자반 고등어 가정용 10미',qty,maxB:999};
  if(norm(pn).includes('삼배체')&&norm(pn).includes('굴'))return{name:'통통 삼배체 굴 1kg',qty,maxB:999};
  if(norm(pn).includes('도다리회'))return{name:'통통 활 도다리회 250g',qty,maxB:999};
  if(norm(pn).includes('바지락살')||(norm(pn).includes('깐')&&norm(pn).includes('바지락')))return{name:'깐 바지락 500g',qty,maxB:999};
  if(norm(pn).includes('총알한치')&&norm(pn).includes('1kg'))return{name:'총알한치 500g',qty:qty*2,maxB:999};
  if((norm(pn).includes('피데기')||norm(pn).includes('반건조오징어'))&&!norm(pn).includes('버터'))return{name:'반건조오징어 1kg 5미',qty,maxB:999};
  if(norm(pn).includes('바다장어')||norm(pn).includes('바다 장어'))return{name:'비만 바다장어 1kg',qty:qty*wi,maxB:999};
  if(norm(pn).includes('생물 풍천 민물 장어')||(norm(pn).includes('민물')&&norm(pn).includes('장어')))return{name:'특왕 민물장어 1kg',qty:qty*wi,maxB:999};
  if(norm(pn).includes('비손질 풀도다리')||(norm(pn).includes('풀도다리')&&!norm(pn).includes('연안')))return{name:'연안 활 풀도다리 1kg',qty,maxB:999};
  if(norm(pn).includes('거북손')&&norm(pn).includes('1kg'))return{name:'연안 거북손 500g',qty:qty*2,maxB:999};
  if(norm(pn).includes('석화')){const sw=wm?wm[0]:'';return{name:('국내산 석화 '+sw).trim(),qty,maxB:qty>=2?1:999};}
  if(norm(pn).includes('새꼬막'))return{name:pn,qty,maxB:qty>=2?1:999};
  if(norm(pn).includes('박달홍게'))return{name:pn,qty,maxB:1};
  if(norm(pn).includes('생대구'))return{name:pn,qty,maxB:6};
  if(norm(pn).includes('낙지'))return{name:'초대왕 S급 낙지 2미',qty,maxB:999};
  return{name:pn,qty,maxB:999};
}

function br(cl,cfg,nq,nr,ord,iv){
  const ph=fp(cfg.phone||ord.cp);
  const sa='address' in cfg?(cfg.address||''):(ord.ca||'');
  const cua=ca(ord.address||'');
  const cup=fp(ord.custPhone||'');
  const msg=ord.msg||'';
  if(iv)return[iv,cl,sa,ph,'',nq,nr,cua,cup,msg].join('\t');
  return[cl,sa,ph,'',nq,nr,cua,cup,msg].join('\t');
}

function isPhone(s){return !!(s.match(/^\d{2,4}-\d{3,4}-\d{4}$/)||s.match(/^\d{9,12}$/));}
function isPureNum(s){return !!(s.match(/^\d{1,6}$/));}

function pr2(line){
  const cols=line.split('\t');
  if(cols.length<4)return null;
  const cl=cols[0].trim().replace(/\s+/g,'');

  // 수량: 맨 뒤 컬럼이 숫자 1~999면 수량으로 간주하고 컬럼에서 제거
  let trailingQty=null;
  const lastCol=(cols[cols.length-1]||'').trim();
  if(lastCol.match(/^\d{1,3}$/)&&parseInt(lastCol)>0&&parseInt(lastCol)<1000){
    trailingQty=parseInt(lastCol);
    cols.pop();
  }

  // 상품명 컬럼 탐색: 단위 패턴으로 먼저 찾기
  const unitPattern = /\d+(kg|g|팩|미|구|개|마리|인분|봉|통|박스|세트|리터|ml|L)/;
  let pi=-1;
  for(let i=1;i<cols.length;i++){
    if(unitPattern.test((cols[i]||'').trim())){pi=i;break;}
  }
  // 단위 없으면 전화번호/숫자 아닌 첫 컬럼 (col[1] 이후)
  if(pi===-1){
    for(let i=1;i<cols.length;i++){
      const c=(cols[i]||'').trim();
      if(c&&!isPhone(c)&&!isPureNum(c)&&c.length>3){pi=i;break;}
    }
  }
  if(pi===-1) pi=1;

  // 상품명 앞 컬럼들에서 업체주소/연락처 추출
  // pi-1: 업체연락처, pi-2: 업체주소 (없을 수도 있음)
  const cp = pi>=2 ? (cols[pi-1]||'').trim() : '';
  const ca2 = pi>=3 ? (cols[pi-2]||'').trim() : '';

  const prod=(cols[pi]||'').trim();
  const nr=(cols[pi+1]||'').trim();
  const addr=(cols[pi+2]||'').trim();
  const p1=(cols[pi+3]||'').trim();
  const p2=(cols[pi+4]||'').trim();
  const p3=(cols[pi+5]||'').trim();
  let custPhone='',msg='';
  if(isPhone(p1)){custPhone=p1;msg=p2+(p3?' '+p3:'');}
  else if(isPhone(p2)){custPhone=p2;msg=p3;}
  else{custPhone=p1||p2;msg=p3;}

  const qm=prod.match(/[x×]\s*(\d+)\s*$/);
  let qty=1;
  if(qm) qty=parseInt(qm[1]);
  else if(trailingQty) qty=trailingQty;

  return{client:cl,ca:ca2,cp,prod,nameRaw:nr,address:addr,custPhone,msg,qty};
}

function run(){
  wc=0;
  const input=document.getElementById('inp').value.trim();
  if(!input){sl('입력 데이터가 없습니다.','warn');return;}
  const lines=mergeLines(input);
  document.getElementById('s-in').textContent=lines.length;
  document.getElementById('in-count').textContent=lines.length+' 행';
  sl(lines.length+'행 처리 중...');
  const out=[];
  for(const line of lines){
    const row=pr2(line);
    if(!row){sl('파싱 실패: '+line.slice(0,30),'warn');continue;}
    const{client,ca:cla,cp,prod,nameRaw,address,custPhone,msg,qty}=row;
    if(client==='식봄'&&address.includes('동해시 대학로 16')){sl('식봄 대표님 주소 제외: '+nameRaw,'warn');continue;}
    let cfg=CC[client]||{};
    if(!CC[client])sl('미등록 업체: '+client,'warn');
    const iv=cfg.insert||'';
    const{name,qty:fq,maxB}=pp(client,prod,qty);
    const ord={address,custPhone,msg,ca:cla,cp};
    if(name.includes(' / ')){
      out.push(br(client,cfg,name,nameRaw,ord,iv));
    } else {
      let rem=fq;
      while(rem>0){const cur=Math.min(rem,maxB);out.push(br(client,cfg,name+' x '+cur,nameRaw,ord,iv));rem-=cur;}
    }
  }
  document.getElementById('out').value=out.join('\n');
  document.getElementById('s-out').textContent=out.length;
  document.getElementById('out-count').textContent=out.length+' 행';
  document.getElementById('s-warn').textContent=wc;
  sl('완료 — '+out.length+'행 출력, 주의 '+wc+'건',wc>0?'warn':'ok');
}

function copyOut(){
  const v=document.getElementById('out').value;
  if(!v)return;
  navigator.clipboard.writeText(v).then(()=>sl('클립보드에 복사됐어요!','ok'));
}

function clearAll(){
  document.getElementById('inp').value='';
  document.getElementById('out').value='';
  ['s-in','s-out','s-warn'].forEach(id=>document.getElementById(id).textContent='0');
  document.getElementById('in-count').textContent='0 행';
  document.getElementById('out-count').textContent='0 행';
  wc=0;sl('초기화됨');
}

document.getElementById('inp').addEventListener('input',function(){
  const n=this.value.trim().split('\n').filter(l=>l.trim()).length;
  document.getElementById('in-count').textContent=n+' 행';
});
</script>
