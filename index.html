<title>발주서 변환기 v21.88</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');
  :root {
    --bg:#f5f4f0;--surface:#ffffff;--surface2:#f0ede8;--border:#e0dbd4;--border2:#ccc8c0;
    --text:#1a1816;--text2:#6b6760;--text3:#a8a49e;
    --accent:#2d6a4f;--accent-light:#e8f4ee;--accent-hover:#1e4d38;

  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}

  .logo span{color:var(--accent)}
  .ver{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);background:var(--accent-light);border:1px solid #b7ddc8;padding:2px 7px;border-radius:20px;font-weight:500}
  .header-right{margin-left:auto;display:flex;align-items:center;gap:20px}
  .stat-inline{display:flex;gap:16px}
  .stat-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text3);font-family:'JetBrains Mono',monospace}
  .stat-item strong{color:var(--text);font-weight:500}
  .stat-item.warn strong{color:var(--warn)}
  .stat-item.ok strong{color:var(--ok)}
  .dot{width:5px;height:5px;border-radius:50%;background:var(--text3)}
  .dot.ok{background:var(--ok)}.dot.warn{background:var(--warn)}
  .workspace{flex:1;display:grid;grid-template-columns:1fr 1fr;overflow:hidden}
  .panel{display:flex;flex-direction:column;border-right:1px solid var(--border);background:var(--surface);overflow:hidden}
  .panel:last-child{border-right:none}
  .panel-head{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface2);flex-shrink:0}
  .panel-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text3)}
  .panel-count{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);background:var(--border);padding:1px 8px;border-radius:10px}
  textarea{flex:1;width:100%;border:none;outline:none;padding:14px 16px;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.75;resize:none;color:var(--text);background:var(--surface)}
  textarea::placeholder{color:var(--text3)}
  #out{background:var(--out-bg);color:var(--out-text)}
  .bottom{background:var(--surface);border-top:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:8px;flex-shrink:0}
  .btn{padding:7px 16px;border-radius:6px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .1s}
  .btn:hover{background:var(--surface2);color:var(--text)}
  .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700;padding:7px 22px}
  .btn.primary:hover{background:var(--accent-hover);border-color:var(--accent-hover)}
  .btn.copy-btn{color:var(--accent);border-color:#b7ddc8;background:var(--accent-light)}
  .btn.copy-btn:hover{background:#d4ecdf}
  .log-pill{margin-left:auto;font-size:11px;padding:4px 12px;border-radius:20px;background:var(--surface2);color:var(--text3);font-family:'JetBrains Mono',monospace;border:1px solid var(--border);max-width:400px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .log-pill.warn{background:var(--warn-bg);color:var(--warn);border-color:#fcd34d}
  .log-pill.ok{background:var(--ok-bg);color:var(--ok);border-color:#b7ddc8}
</style>
</head>

엑셀에 그대로 붙여넣으세요."></textarea>

<script>
const CC={
  "장씨네":{phone:"010-2458-1788",insert:"더본초"},
  "지구식품":{phone:"070-4800-1166",insert:"동글지구"},
  "비엠리테일":{phone:"010-7763-8654",insert:"에스에이치리테일"},
  "청년어부":{phone:"010-2614-6813",insert:"마우셀"},
  "혜인건강":{phone:"070-4473-7196",insert:"HN"},
  "파더그로브":{phone:"0502-2679-0637",insert:"퍼니밀"},
  "김융환":{phone:"",insert:"발볼"},
  "대상수산":{address:"목포시 고하대로 597번길 1(죽교동)",phone:"010-3649-0583"},
  "거문도수산":{address:"여수시 이순신광장로 125-3",phone:"010-9325-9899"},
  "아크미소프트":{address:"서울시 마포구 매봉산로 37",phone:"02-3706-6522"},
  "서진농수산":{address:"서울 강남구 테헤란로 424",phone:"010-8050-4229",insert:"도리농수산"},
  "다정한공간":{phone:"010-9318-0895"},
  "인베스토어":{phone:"010-7772-2984"},
  "와이플로우":{phone:"1833-2285"},
  "미식탁":{address:"",phone:"010-9119-3158"},
  "명가네농장":{phone:"010-6467-5832",insert:"명안"},
  "춘식이네":{phone:"010-5882-7730",insert:"그록"},
  "라파고척본점":{phone:"010-2762-9227"},
  "배민대용량":{phone:"010-2455-4156"},
  "삼월이농수산":{phone:"010-6652-1574",insert:"냠냠식탁"},
  "식봄":{address:"",phone:"010-2455-4156"},
  "신선한아침":{phone:"070-7761-7676"},
  "우디":{phone:"010-7929-8080",insert:"우디디자인랩"},
  "제이피컴퍼니":{address:"하남시 미사강변한강로 165",phone:"010-2843-3051",insert:"서율컴퍼니"},
  "호호야채":{address:"부천시 소향로223 105호 호호야채",phone:"010-7241-1903"},
  "지투지샵":{address:"서울특별시 금천구 서부샛길 606, A동 2610호 (가산동, 대성디폴리스지식산업센터)",phone:"010-2329-8991"},
  "토리팜":{address:"경남 합천군 용주면 고품용덕길 38-1",phone:"010-5758-0367"},
  "푸른결":{address:"",phone:"070-3177-8080"}
};

const RA="강원특별자치도 동해시 대학로 16";

// 헤더 행 키워드
const HEADER_KEYWORDS=["주문처","업체명","거래처","공급사","상품명","고객명","수취인","연락처"];

let wc=0;

function sl(m,t){const e=document.getElementById('log');e.textContent=m;e.className='log-pill'+(t?' '+t:'');if(t==='warn')wc++;}

function fp(t){
  if(!t)return"";
  const n=String(t).replace(/[^0-9]/g,'');
  if(!n)return"";
  if(n.length===12&&n.startsWith('050'))return n.slice(0,4)+'-'+n.slice(4,8)+'-'+n.slice(8);
  if(n.length>=10){
    if(n.startsWith('02'))return n.slice(0,2)+'-'+n.slice(2,6)+'-'+n.slice(6);
    return n.slice(0,3)+'-'+n.slice(3,7)+'-'+n.slice(7);
  }
  return n;
}

function ca(a){
  if(!a)return"";
  if(a.includes(RA))a=a.replace(RA,"").replace("(천곡동)","").trim();
  return a.replace("출고지주소","").replace(/\//g," ").trim();
}

function isKnownClient(s){return !!CC[s.replace(/\s+/g,'')];}

function isHeaderRow(line){
  const first=line.split('\t')[0].trim();
  return HEADER_KEYWORDS.some(k=>first.includes(k));
}

// 줄 첫 컬럼이 새로운 발주 시작인지 판단
// - 등록된 업체명이면 무조건 새 행
// - 미등록이라도 이전 행 첫 컬럼과 같은 값이 반복되면 새 행 (같은 업체가 여러 발주)
// - 이전 행 첫 컬럼과 다르고 미등록이면 이전 행의 연장(줄바꿈)으로 간주
function mergeLines(raw){
  const lines=raw.split('\n');
  const merged=[];
  let lastClient='';
  for(const line of lines){
    const trimmed=line.trim();
    if(!trimmed)continue;
    if(isHeaderRow(trimmed)){sl('헤더 행 제거됨','');continue;}
    const firstCol=trimmed.split('\t')[0].trim().replace(/\s+/g,'');
    const isNew = isKnownClient(firstCol) || firstCol===lastClient;
    if(merged.length===0||isNew){
      merged.push(trimmed);
      if(firstCol) lastClient=firstCol;
    } else {
      merged[merged.length-1]=merged[merged.length-1]+'\t'+trimmed;
    }
  }
  return merged;
}

function pp(cl,pr,qty){
  let r=pr.replace(/\*/g,'x');
  if(r.includes('+')){const it=r.split('+').map(i=>i.trim());return{name:it.map(i=>/[x×]\s*\d+/.test(i)?i:i+' x 1').join(' / '),qty,maxB:999};}
  if(r.includes('/')){const pt=r.split('/').map(s=>s.trim()).filter(Boolean);if(pt.length>1)return{name:pt.map(i=>/[x×]\s*\d+/.test(i)?i:i+' x 1').join(' / '),qty,maxB:999};r=pt[0];}
  const qm=r.match(/\s*[x×]\s*(\d+)$/);let cn=r;
  if(qm){qty=parseInt(qm[1]);cn=r.slice(0,qm.index).trim();}
  cn=cn.replace(/\[마스터\]/g,'').replace('연안명게','연안 멍게').replace('난간','난각').replace(/(\d+)[kK]\b/g,'$1kg').trim();
  if(cn.includes('자연산 급냉 대구'))cn='급냉 국내산 대구 1.5kg';
  if(cn.includes('급냉 참치 오마카세 한판'))cn='참치 오마카세 한판';
  if(cl==='신선한아침'&&cn.includes('노르웨이 생연어'))cn='연안 생연어';
  if(cn.includes('유정란')){const em=cn.match(/(\d+)\s*[구알]/);const en=em?em[1]:'';if(cn.includes('1번'))return{name:'자연방사 난각 1번 유정란 '+en+'구',qty,maxB:999};if(cn.includes('2번'))return{name:'동물복지 난각 2번 유정란 '+en+'구',qty,maxB:999};}
  if(cl==='아크미소프트'&&cn.includes('홍어'))cn='아 '+cn;
  const wm=cn.match(/(\d+)kg/);const wi=wm?parseInt(wm[1]):1;
  const pn=qm?cn:cn.replace(/[x×]\s*[\d.]+/g,'').trim();
  if(cl==='대상수산'){
    if(pn.includes('호래기'))return{name:'횟감 대짜 호래기 500g',qty:qty*wi*2,maxB:999};
    if(pn.includes('참소라'))return{name:'연안 주먹참소라 1kg',qty:qty*wi,maxB:999};
    if(pn.includes('주꾸미')||pn.includes('쭈꾸미'))return{name:'연안 활 주꾸미 1kg',qty:qty*wi,maxB:999};
    if(pn.includes('전복'))return{name:'연안 오육미전복 1kg',qty:qty*wi,maxB:999};
    if(pn.includes('멍게'))return{name:'향긋 깐 멍게 500g',qty:qty*wi*2,maxB:999};
    if(pn.includes('홍가리비'))return{name:'활 홍가리비 1kg',qty:qty*wi,maxB:999};
    if(pn.includes('바지락')&&!pn.includes('깐'))return{name:'왕 바지락 1kg',qty:qty*wi,maxB:999};
    if(pn.includes('바지락살')||(pn.includes('깐')&&pn.includes('바지락')))return{name:'깐 바지락 500g',qty:qty*wi*2,maxB:999};
  }
  if(pn.includes('홍가리비'))return{name:'활 홍가리비 1kg',qty,maxB:999};
  if(pn.includes('생굴')&&!pn.includes('kg'))return{name:'생굴 1kg',qty,maxB:999};
  if(pn.includes('꼼장어'))return{name:'생물 꼼장어 1kg',qty,maxB:999};
  if(pn.includes('염소탕'))return{name:'김대헌 장수 염소탕 1팩',qty,maxB:999};
  if(pn.includes('자반')&&pn.includes('고등어'))return{name:'국내산 자반 고등어 가정용 10미',qty,maxB:999};
  if(pn.includes('삼배체')&&pn.includes('굴'))return{name:'통통 삼배체 굴 1kg',qty,maxB:999};
  if(pn.includes('도다리회'))return{name:'통통 활 도다리회 250g',qty,maxB:999};
  if(pn.includes('바지락살')||(pn.includes('깐')&&pn.includes('바지락')))return{name:'깐 바지락 500g',qty,maxB:999};
  if(pn.includes('총알한치')&&pn.includes('1kg'))return{name:'총알한치 500g',qty:qty*2,maxB:999};
  if((pn.includes('피데기')||pn.includes('반건조오징어'))&&!pn.includes('버터'))return{name:'반건조오징어 1kg 5미',qty,maxB:999};
  if(pn.includes('바다장어'))return{name:'비만 바다장어 1kg',qty,maxB:999};
  if(pn.includes('생물 풍천 민물 장어')||(pn.includes('민물')&&pn.includes('장어')))return{name:'특왕 민물장어 1kg',qty,maxB:999};
  if(pn.includes('비손질 풀도다리')||(pn.includes('풀도다리')&&!pn.includes('연안')))return{name:'연안 활 풀도다리 1kg',qty,maxB:999};
  if(pn.includes('거북손')&&pn.includes('1kg'))return{name:'연안 거북손 500g',qty:qty*2,maxB:999};
  if(pn.includes('석화')){const sw=wm?wm[0]:'';return{name:('국내산 석화 '+sw).trim(),qty,maxB:qty>=2?1:999};}
  if(pn.includes('새꼬막'))return{name:pn,qty,maxB:qty>=2?1:999};
  if(pn.includes('박달홍게'))return{name:pn,qty,maxB:1};
  if(pn.includes('생대구'))return{name:pn,qty,maxB:6};
  if(pn.includes('낙지'))return{name:'초대왕 S급 낙지 2미',qty,maxB:999};
  return{name:pn,qty,maxB:999};
}

function br(cl,cfg,nq,nr,ord,iv){
  const ph=fp(cfg.phone||ord.cp);
  const sa='address' in cfg?(cfg.address||''):(ord.ca||'');
  const cua=ca(ord.address||'');
  const cup=fp(ord.custPhone||'');
  const msg=ord.msg||'';
  if(iv)return[iv,cl,sa,ph,'',nq,nr,cua,cup,msg].join('\t');
  return[cl,sa,ph,'',nq,nr,cua,cup,msg].join('\t');
}

function isPhone(s){return !!(s.match(/^\d{2,4}-\d{3,4}-\d{4}$/)||s.match(/^\d{9,12}$/));}
function isPureNum(s){return !!(s.match(/^\d{1,6}$/));}

function pr2(line){
  const cols=line.split('\t');
  if(cols.length<5)return null;
  const cl=cols[0].trim().replace(/\s+/g,'');
  const ca2=(cols[1]||'').trim();
  const cp=(cols[2]||'').trim();

  // 수량: 맨 뒤 컬럼이 숫자 1~999면 수량으로 간주하고 컬럼에서 제거
  let trailingQty=null;
  const lastCol=(cols[cols.length-1]||'').trim();
  if(lastCol.match(/^\d{1,3}$/)&&parseInt(lastCol)>0&&parseInt(lastCol)<1000){
    trailingQty=parseInt(lastCol);
    cols.pop(); // 출력에서 제거
  }

  // 상품명 컬럼 탐색: 단위(kg,g,팩,미,구,개,마리) 포함된 컬럼 우선, 없으면 전화번호/숫자 아닌 첫 컬럼
  const unitPattern = /\d+(kg|g|팩|미|구|개|마리|인분|봉|통|박스|세트|리터|ml|L)/;
  let pi=3;
  // 1차: 단위 포함 컬럼 찾기 (최소 col[2]부터, 업체연락처 이후)
  for(let i=2;i<Math.min(cols.length,10);i++){
    const c=cols[i].trim();
    if(c && unitPattern.test(c)){pi=i;break;}
  }
  // 2차: 단위 없으면 전화번호/숫자 아닌 첫 텍스트 컬럼 (최소 col[3]부터)
  if(pi===3 && !unitPattern.test((cols[3]||'').trim())){
    for(let i=3;i<Math.min(cols.length,8);i++){
      const c=cols[i].trim();
      if(c&&!isPhone(c)&&!isPureNum(c)&&c.length>3){
        pi=i;break;
      }
    }
  }

  const prod=(cols[pi]||'').trim();
  const nr=(cols[pi+1]||'').trim();
  const addr=(cols[pi+2]||'').trim();
  const p1=(cols[pi+3]||'').trim();
  const p2=(cols[pi+4]||'').trim();
  const p3=(cols[pi+5]||'').trim();
  let custPhone='',msg='';
  if(isPhone(p1)){custPhone=p1;msg=p2+(p3?' '+p3:'');}
  else if(isPhone(p2)){custPhone=p2;msg=p3;}
  else{custPhone=p1||p2;msg=p3;}

  // 수량 결정: 상품명 뒤 x수량 우선, 없으면 trailing 수량, 없으면 1
  const qm=prod.match(/[x×]\s*(\d+)\s*$/);
  let qty=1;
  if(qm) qty=parseInt(qm[1]);
  else if(trailingQty) qty=trailingQty;

  return{client:cl,ca:ca2,cp,prod,nameRaw:nr,address:addr,custPhone,msg,qty};
}

function run(){
  wc=0;
  const input=document.getElementById('inp').value.trim();
  if(!input){sl('입력 데이터가 없습니다.','warn');return;}
  const lines=mergeLines(input);
  document.getElementById('s-in').textContent=lines.length;
  document.getElementById('in-count').textContent=lines.length+' 행';
  sl(lines.length+'행 처리 중...');
  const out=[];
  for(const line of lines){
    const row=pr2(line);
    if(!row){sl('파싱 실패: '+line.slice(0,30),'warn');continue;}
    const{client,ca:cla,cp,prod,nameRaw,address,custPhone,msg,qty}=row;
    if(client==='식봄'&&address.includes('동해시 대학로 16')){sl('식봄 대표님 주소 제외: '+nameRaw,'warn');continue;}
    let cfg=CC[client]||{};
    if(!CC[client])sl('미등록 업체: '+client,'warn');
    const iv=cfg.insert||'';
    const{name,qty:fq,maxB}=pp(client,prod,qty);
    const ord={address,custPhone,msg,ca:cla,cp};
    if(name.includes(' / ')){
      out.push(br(client,cfg,name,nameRaw,ord,iv));
    } else {
      let rem=fq;
      while(rem>0){const cur=Math.min(rem,maxB);out.push(br(client,cfg,name+' x '+cur,nameRaw,ord,iv));rem-=cur;}
    }
  }
  document.getElementById('out').value=out.join('\n');
  document.getElementById('s-out').textContent=out.length;
  document.getElementById('out-count').textContent=out.length+' 행';
  document.getElementById('s-warn').textContent=wc;
  sl('완료 — '+out.length+'행 출력, 주의 '+wc+'건',wc>0?'warn':'ok');
}

function copyOut(){
  const v=document.getElementById('out').value;
  if(!v)return;
  navigator.clipboard.writeText(v).then(()=>sl('클립보드에 복사됐어요!','ok'));
}

function clearAll(){
  document.getElementById('inp').value='';
  document.getElementById('out').value='';
  ['s-in','s-out','s-warn'].forEach(id=>document.getElementById(id).textContent='0');
  document.getElementById('in-count').textContent='0 행';
  document.getElementById('out-count').textContent='0 행';
  wc=0;sl('초기화됨');
}

document.getElementById('inp').addEventListener('input',function(){
  const n=this.value.trim().split('\n').filter(l=>l.trim()).length;
  document.getElementById('in-count').textContent=n+' 행';
});
</script>
