<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>통장 내역 조회</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{--bg:#f5f4f0;--surface:#fff;--surface2:#f0ede8;--border:#e0dbd4;--border2:#ccc8c0;--text:#1a1816;--text2:#6b6760;--text3:#a8a49e;--accent:#2d6a4f;--accent-light:#e8f4ee;--accent-hover:#1e4d38;--in:#1a6b3c;--in-bg:#e8f5ee;--in-border:#b7ddc8;--out:#b45309;--out-bg:#fef3c7;--out-border:#fcd34d;--warn:#dc2626;--chat-w:360px;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;min-height:100vh;display:flex;flex-direction:column}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.logo{font-size:15px;font-weight:700;letter-spacing:-.03em} .logo span{color:var(--accent)}
.ver{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);background:var(--accent-light);border:1px solid var(--in-border);padding:2px 7px;border-radius:20px}
.layout{display:flex;flex:1;min-height:0} .main-panel{flex:1;overflow-y:auto;padding-bottom:24px}
.chat-panel{width:var(--chat-w);min-width:var(--chat-w);background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;height:calc(100vh - 52px);position:sticky;top:52px}
.upload-zone{margin:20px 24px 0;background:var(--surface);border:2px dashed var(--border2);border-radius:10px;padding:28px;text-align:center;cursor:pointer;transition:all .15s}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:var(--accent-light)} .upload-zone.loaded{border-style:solid;border-color:var(--in-border);background:var(--in-bg)}
.upload-zone .icon{font-size:26px;margin-bottom:6px} .upload-zone .label{font-size:14px;font-weight:500;color:var(--text2)} .upload-zone .hint{font-size:11px;color:var(--text3);margin-top:4px}
#fileInput{display:none}
.filter-bar{margin:14px 24px 0;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.filter-bar label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.filter-bar input[type=date]{padding:5px 8px;border:1px solid var(--border2);border-radius:5px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text);background:var(--surface);outline:none}
.filter-bar input[type=date]:focus{border-color:var(--accent)} .sep{color:var(--text3);font-size:12px}
.type-btns{display:flex;gap:4px;border:1px solid var(--border2);border-radius:6px;overflow:hidden}
.type-btn{padding:5px 12px;border:none;background:transparent;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:500;cursor:pointer;color:var(--text2);transition:all .1s}
.type-btn.active{background:var(--accent);color:#fff;font-weight:700} .type-btn.in.active{background:var(--in)} .type-btn.out.active{background:var(--out)}
.search-wrap{margin-left:auto;position:relative} .search-wrap input{padding:5px 8px 5px 28px;border:1px solid var(--border2);border-radius:5px;font-size:12px;width:160px;outline:none;color:var(--text)}
.search-wrap input:focus{border-color:var(--accent)} .search-wrap .ico{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px}
.btn-reset{padding:5px 12px;border:1px solid var(--border2);border-radius:5px;background:var(--surface);font-size:12px;cursor:pointer;color:var(--text2)} .btn-reset:hover{background:var(--surface2)}
.summary-row{margin:12px 24px 0;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px}
.card .title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.card .amount{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:var(--text)} .card .amount.in{color:var(--in)} .card .amount.out{color:var(--out)} .card .sub{font-size:11px;color:var(--text3);margin-top:2px}
.table-wrap{margin:12px 24px 0;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.table-head{padding:9px 14px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.table-head .tl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3)} .table-head .tr{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace}
table{width:100%;border-collapse:collapse} th{padding:8px 10px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);border-bottom:1px solid var(--border);background:var(--surface2);white-space:nowrap}
th.r,td.r{text-align:right} td{padding:7px 10px;font-size:12px;border-bottom:1px solid var(--border);color:var(--text)} tr:last-child td{border-bottom:none} tr:hover td{background:#fafaf8}
td.in-amt{font-family:'JetBrains Mono',monospace;color:var(--in);font-weight:600} td.out-amt{font-family:'JetBrains Mono',monospace;color:var(--out)}
td.date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);white-space:nowrap} td.desc{max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
td.name{color:var(--text2);font-size:11px} td.bank{color:var(--text3);font-size:11px} td.bal{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3)}
.empty{padding:40px;text-align:center;color:var(--text3)} .highlight{background:#fff3cd;border-radius:2px;padding:0 1px}
.chat-header{padding:14px 18px;border-bottom:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;gap:8px;flex-shrink:0}
.chat-header .ch-title{font-size:13px;font-weight:700} .chat-header .ch-sub{font-size:11px;color:var(--text3);margin-left:auto}
.chat-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.chat-bubble{display:flex;flex-direction:column;max-width:90%} .chat-bubble.user{align-self:flex-end;align-items:flex-end} .chat-bubble.bot{align-self:flex-start;align-items:flex-start}
.bubble-text{padding:10px 13px;border-radius:14px;font-size:12px;line-height:1.6;word-break:break-word}
.chat-bubble.user .bubble-text{background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.chat-bubble.bot .bubble-text{background:var(--surface2);color:var(--text);border-bottom-left-radius:4px;border:1px solid var(--border)}
.bubble-text b{font-weight:700} .bubble-text .amt-in{color:var(--in);font-family:'JetBrains Mono',monospace;font-weight:700} .bubble-text .amt-out{color:var(--out);font-family:'JetBrains Mono',monospace;font-weight:700} .bubble-text .amt{font-family:'JetBrains Mono',monospace;font-weight:700}
.bubble-text table{width:100%;border-collapse:collapse;margin-top:6px;font-size:11px} .bubble-text table td{padding:3px 6px;border-bottom:1px solid var(--border)} .bubble-text table tr:last-child td{border-bottom:none}
.bubble-time{font-size:10px;color:var(--text3);margin-top:3px;padding:0 4px}
.chat-hint{background:var(--accent-light);border:1px solid var(--in-border);border-radius:10px;padding:12px 14px;font-size:11px;color:var(--text2);line-height:1.7} .chat-hint b{color:var(--accent);font-weight:600}
.chat-input-wrap{padding:12px 14px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
.chat-input-row{display:flex;gap:8px;align-items:flex-end}
.chat-input-row textarea{flex:1;padding:9px 12px;border:1px solid var(--border2);border-radius:10px;font-family:'Noto Sans KR',sans-serif;font-size:12px;color:var(--text);resize:none;outline:none;line-height:1.5;max-height:80px}
.chat-input-row textarea:focus{border-color:var(--accent)}
.chat-send-btn{padding:9px 14px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:13px;cursor:pointer;transition:background .1s;flex-shrink:0} .chat-send-btn:hover{background:var(--accent-hover)}
.quick-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.qbtn{padding:4px 10px;border:1px solid var(--border2);border-radius:20px;background:var(--surface);font-size:11px;cursor:pointer;color:var(--text2);font-family:'Noto Sans KR',sans-serif;transition:all .1s;white-space:nowrap} .qbtn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
</style></head>
<body>
<header><span class="logo">통장 <span>내역 조회</span></span><span class="ver">v2.1</span></header>
<div class="layout">
<div class="main-panel">
<div class="upload-zone" id="dropzone" onclick="document.getElementById('fileInput').click()">
<div class="icon">📂</div>
<div class="label" id="uploadLabel">은행 거래내역 xlsx 파일을 끌어다 놓거나 클릭해서 업로드</div>
<div class="hint" id="uploadHint">하나은행 기업자유예금 형식 지원</div>
<div id="savedFileInfo" style="display:none;margin-top:8px;font-size:11px;color:var(--text3)">💾 <span id="savedFileName"></span> · <button onclick="clearSaved(event)" style="border:none;background:none;color:var(--warn);cursor:pointer;font-size:11px;padding:0">저장 파일 삭제</button></div>
</div>
<input type="file" id="fileInput" accept=".xlsx,.xls">
<div class="filter-bar" id="filterBar" style="display:none">
<label>기간</label><input type="date" id="dateFrom" oninput="applyFilter()"><span class="sep">~</span><input type="date" id="dateTo" oninput="applyFilter()">
<div class="type-btns"><button class="type-btn active" data-t="all" onclick="setType('all')">전체</button><button class="type-btn in" data-t="in" onclick="setType('in')">입금</button><button class="type-btn out" data-t="out" onclick="setType('out')">출금</button></div>
<div class="search-wrap"><span class="ico">🔍</span><input type="text" id="searchQ" placeholder="거래내용 검색..." oninput="applyFilter()"></div>
<button class="btn-reset" onclick="resetFilter()">전체보기</button></div>
<div class="summary-row" id="summaryRow" style="display:none">
<div class="card"><div class="title">조회 건수</div><div class="amount" id="s-count">0</div><div class="sub" id="s-period">-</div></div>
<div class="card"><div class="title">입금 합계</div><div class="amount in" id="s-in">0</div><div class="sub" id="s-in-cnt">0건</div></div>
<div class="card"><div class="title">출금 합계</div><div class="amount out" id="s-out">0</div><div class="sub" id="s-out-cnt">0건</div></div>
<div class="card"><div class="title">순 입금</div><div class="amount" id="s-net">0</div><div class="sub">입금 - 출금</div></div></div>
<div class="table-wrap" id="tableWrap" style="display:none">
<div class="table-head"><span class="tl">거래 내역</span><span class="tr" id="tableCount"></span></div>
<table><thead><tr><th>거래일시</th><th>거래내용</th><th>상대은행</th><th>예금주명</th><th class="r">입금</th><th class="r">출금</th><th class="r">거래후 잔액</th></tr></thead><tbody id="tbody"></tbody></table></div>
</div>
<div class="chat-panel">
<div class="chat-header"><span>💬</span><span class="ch-title">질문하기</span><span class="ch-sub" id="chatStatus">파일 업로드 후 이용 가능</span></div>
<div class="chat-body" id="chatBody">
<div class="chat-hint"><b>이렇게 물어보세요</b><br>• 3월 입금 총액이 얼마야?<br>• 4월 1일부터 15일까지 출금<br>• 홍길동 입금 얼마야?<br>• 누가 제일 많이 입금했어?<br>• 이번달 순입금 얼마야?<br>• 현재 잔액 얼마야?</div></div>
<div class="chat-input-wrap">
<div class="quick-btns">
<button class="qbtn" onclick="quickAsk('이번달 입금 총액')">이번달 입금</button>
<button class="qbtn" onclick="quickAsk('이번달 출금 총액')">이번달 출금</button>
<button class="qbtn" onclick="quickAsk('누가 제일 많이 입금했어?')">입금 TOP5</button>
<button class="qbtn" onclick="quickAsk('현재 잔액')">현재 잔액</button>
<button class="qbtn" onclick="quickAsk('전체 입금 합계')">전체 합계</button></div>
<div class="chat-input-row">
<textarea id="chatInput" placeholder="궁금한 거 물어보세요..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}" oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,80)+'px'"></textarea>
<button class="chat-send-btn" onclick="sendChat()">↑</button></div></div></div></div>
<script>
let allData=[],currentType="all";
const DB_NAME="bankviewer",DB_VER=1,STORE="files";
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,DB_VER);r.onupgradeneeded=e=>e.target.result.createObjectStore(STORE);r.onsuccess=e=>res(e.target.result);r.onerror=rej;});}
async function saveFile(name,buf){const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction(STORE,"readwrite");tx.objectStore(STORE).put({name,buf,savedAt:new Date().toISOString()},"last");tx.oncomplete=res;tx.onerror=rej;});}
async function loadSavedFile(){const db=await openDB();return new Promise((res,rej)=>{const r=db.transaction(STORE,"readonly").objectStore(STORE).get("last");r.onsuccess=e=>res(e.target.result||null);r.onerror=rej;});}
async function deleteSavedFile(){const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction(STORE,"readwrite");tx.objectStore(STORE).delete("last");tx.oncomplete=res;tx.onerror=rej;});}
function clearSaved(e){e.stopPropagation();if(!confirm("저장된 파일을 삭제할까요?"))return;deleteSavedFile();document.getElementById("savedFileInfo").style.display="none";document.getElementById("uploadHint").textContent="하나은행 기업자유예금 형식 지원";allData=[];["filterBar","summaryRow","tableWrap"].forEach(id=>document.getElementById(id).style.display="none");dz.classList.remove("loaded");document.getElementById("uploadLabel").textContent="은행 거래내역 xlsx 파일을 끌어다 놓거나 클릭해서 업로드";document.getElementById("chatStatus").textContent="파일 업로드 후 이용 가능";}
window.addEventListener("DOMContentLoaded",async()=>{const saved=await loadSavedFile().catch(()=>null);if(!saved)return;const d=new Date(saved.savedAt),label=(d.getMonth()+1)+"/"+d.getDate()+" "+d.getHours()+":"+String(d.getMinutes()).padStart(2,"0")+" 저장";document.getElementById("savedFileName").textContent=saved.name+" ("+label+")";document.getElementById("savedFileInfo").style.display="block";document.getElementById("uploadHint").textContent="저장된 파일 불러오는 중...";const wb=XLSX.read(new Uint8Array(saved.buf),{type:"array",cellText:true,cellDates:true});const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,raw:false,defval:""});parseRows(rows,saved.name,false);document.getElementById("uploadHint").textContent="저장된 파일을 자동으로 불러왔어요 ✅";});
document.getElementById("fileInput").addEventListener("change",e=>{const f=e.target.files[0];if(f)readFile(f);});
const dz=document.getElementById("dropzone");
dz.addEventListener("dragover",e=>{e.preventDefault();dz.classList.add("drag");});
dz.addEventListener("dragleave",()=>dz.classList.remove("drag"));
dz.addEventListener("drop",e=>{e.preventDefault();dz.classList.remove("drag");const f=e.dataTransfer.files[0];if(f)readFile(f);});
function readFile(file){const r=new FileReader();r.onload=async e=>{const buf=e.target.result;const wb=XLSX.read(new Uint8Array(buf),{type:"array",cellText:true,cellDates:true});const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,raw:false,defval:""});parseRows(rows,file.name,true);await saveFile(file.name,buf).catch(()=>{});const now=new Date(),label=(now.getMonth()+1)+"/"+now.getDate()+" "+now.getHours()+":"+String(now.getMinutes()).padStart(2,"0")+" 저장";document.getElementById("savedFileName").textContent=file.name+" ("+label+")";document.getElementById("savedFileInfo").style.display="block";};r.readAsArrayBuffer(file);}
function parseRows(rows,fn,showChat=true){allData=[];let hi=rows.findIndex(r=>r.some(c=>String(c).includes("거래일시")));if(hi===-1)hi=2;const hdr=rows[hi];const ci={date:hdr.findIndex(c=>String(c).includes("거래일시")),out:hdr.findIndex(c=>String(c).trim()==="출금"),in:hdr.findIndex(c=>String(c).trim()==="입금"),bal:hdr.findIndex(c=>String(c).includes("잔액")),desc:hdr.findIndex(c=>String(c).includes("거래내용")),bank:hdr.findIndex(c=>String(c).includes("상대은행")),name:hdr.findIndex(c=>String(c).includes("예금주명"))};if(ci.date===-1)Object.assign(ci,{date:1,out:2,in:3,bal:4,desc:5,bank:7,name:12});for(let i=hi+1;i<rows.length;i++){const r=rows[i];const ds=String(r[ci.date]||"").trim();if(!ds||ds==="합계")continue;const ia=pn(r[ci.in]),oa=pn(r[ci.out]);if(ia===0&&oa===0)continue;allData.push({date:ds,dateOnly:ds.slice(0,10),in:ia,out:oa,bal:pn(r[ci.bal]),desc:String(r[ci.desc]||"").trim(),bank:String(r[ci.bank]||"").trim(),name:String(r[ci.name]||"").trim()});}if(!allData.length){alert("데이터를 읽지 못했어요.");return;}const dates=allData.map(d=>d.dateOnly).sort();document.getElementById("dateFrom").value=dates[0];document.getElementById("dateTo").value=dates[dates.length-1];dz.classList.add("loaded");document.getElementById("uploadLabel").textContent="✅ "+fn+" 로드 완료 ("+allData.length+"건)";document.getElementById("filterBar").style.display="flex";document.getElementById("summaryRow").style.display="grid";document.getElementById("tableWrap").style.display="block";document.getElementById("chatStatus").textContent=allData.length+"건 로드됨";applyFilter();if(showChat)addBotMsg("파일 로드 완료! 📊 총 <b>"+allData.length+"건</b> 궁금한 거 물어보세요!");else addBotMsg("저장 파일 자동 복원! 📂 <b>"+allData.length+"건</b> 로드됨. 궁금한 거 물어보세요!");}
function pn(v){const s=String(v||"").replace(/,/g,"").trim();const n=parseInt(s);return isNaN(n)?0:n;}
function fmtN(n){return n.toLocaleString("ko-KR")+"원";}
function nowTime(){const d=new Date();return d.getHours()+":"+String(d.getMinutes()).padStart(2,"0");}
function setType(t){currentType=t;document.querySelectorAll(".type-btn").forEach(b=>b.classList.toggle("active",b.dataset.t===t));applyFilter();}
function resetFilter(){if(!allData.length)return;const dates=allData.map(d=>d.dateOnly).sort();document.getElementById("dateFrom").value=dates[0];document.getElementById("dateTo").value=dates[dates.length-1];document.getElementById("searchQ").value="";setType("all");}
function applyFilter(){if(!allData.length)return;const from=document.getElementById("dateFrom").value,to=document.getElementById("dateTo").value,q=document.getElementById("searchQ").value.trim().toLowerCase();let f=allData.filter(d=>{if(from&&d.dateOnly<from)return false;if(to&&d.dateOnly>to)return false;if(currentType==="in"&&d.in===0)return false;if(currentType==="out"&&d.out===0)return false;if(q&&!(d.desc+" "+d.name+" "+d.bank).toLowerCase().includes(q))return false;return true;});const ti=f.reduce((s,d)=>s+d.in,0),to2=f.reduce((s,d)=>s+d.out,0),ci=f.filter(d=>d.in>0).length,co=f.filter(d=>d.out>0).length;document.getElementById("s-count").textContent=f.length.toLocaleString()+"건";document.getElementById("s-period").textContent=from&&to?from+" ~ "+to:"-";document.getElementById("s-in").textContent=fmtN(ti);document.getElementById("s-in-cnt").textContent=ci+"건";document.getElementById("s-out").textContent=fmtN(to2);document.getElementById("s-out-cnt").textContent=co+"건";const net=ti-to2,ne=document.getElementById("s-net");ne.textContent=(net>=0?"+":"")+fmtN(net);ne.style.color=net>=0?"var(--in)":"var(--out)";document.getElementById("tableCount").textContent=f.length+"건";const tb=document.getElementById("tbody");if(!f.length){tb.innerHTML='<tr><td colspan="7" class="empty">조건에 맞는 거래 내역이 없어요</td></tr>';return;}const hl=(s,q)=>{if(!q)return s;const re=new RegExp("("+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi");return s.replace(re,'<span class="highlight">$1</span>');};tb.innerHTML=f.map(d=>"<tr><td class='date'>"+d.date.replace("T"," ")+"</td><td class='desc'>"+hl(d.desc,q)+"</td><td class='bank'>"+d.bank+"</td><td class='name'>"+hl(d.name,q)+"</td><td class='r "+(d.in>0?"in-amt":"")+"'>"+(d.in>0?fmtN(d.in):"")+"</td><td class='r "+(d.out>0?"out-amt":"")+"'>"+(d.out>0?fmtN(d.out):"")+"</td><td class='r bal'>"+fmtN(d.bal)+"</td></tr>").join("");}
function addUserMsg(t){const b=document.getElementById("chatBody"),e=document.createElement("div");e.className="chat-bubble user";e.innerHTML='<div class="bubble-text">'+t+'</div><div class="bubble-time">'+nowTime()+"</div>";b.appendChild(e);b.scrollTop=b.scrollHeight;}
function addBotMsg(h){const b=document.getElementById("chatBody"),e=document.createElement("div");e.className="chat-bubble bot";e.innerHTML='<div class="bubble-text">'+h+'</div><div class="bubble-time">'+nowTime()+"</div>";b.appendChild(e);b.scrollTop=b.scrollHeight;}
function quickAsk(t){document.getElementById("chatInput").value=t;sendChat();}
function sendChat(){const inp=document.getElementById("chatInput"),t=inp.value.trim();if(!t)return;inp.value="";inp.style.height="auto";addUserMsg(t);if(!allData.length){addBotMsg("먼저 xlsx 파일을 업로드해 주세요! 📂");return;}setTimeout(()=>addBotMsg(interpret(t)),200);}
function interpret(q){const orig=q;q=q.toLowerCase().replace(/\s+/g," ").trim();const yc={};allData.forEach(d=>{const y=d.dateOnly.slice(0,4);yc[y]=(yc[y]||0)+1;});const by=Object.entries(yc).sort((a,b)=>b[1]-a[1])[0][0];const now=new Date(),cm=now.getMonth()+1;
if(/잔액|남은돈|얼마있어|얼마 있어/.test(q)){const l=allData[allData.length-1];return "현재 잔액 <span class='amt'>"+fmtN(l.bal)+"</span><br><small style='color:var(--text3)'>"+l.date.replace("T"," ")+" 기준</small>";}
let fd=null,td=null;const rm=q.match(/(\d{1,2})월\s*(\d{1,2})일\s*[~부터～\-]\s*(?:(\d{1,2})월\s*)?(\d{1,2})일/);
if(rm){const m1=+rm[1],d1=+rm[2],m2=rm[3]?+rm[3]:m1,d2=+rm[4];fd=by+"-"+String(m1).padStart(2,"0")+"-"+String(d1).padStart(2,"0");td=by+"-"+String(m2).padStart(2,"0")+"-"+String(d2).padStart(2,"0");}
if(!fd){let tm=null;if(/이번달|이번 달/.test(q))tm=cm;else if(/지난달|저번달/.test(q))tm=cm===1?12:cm-1;else{const mm=q.match(/(\d{1,2})월/);if(mm)tm=+mm[1];}if(tm){const yr=tm>cm?String(+by-1):by;fd=yr+"-"+String(tm).padStart(2,"0")+"-01";td=yr+"-"+String(tm).padStart(2,"0")+"-"+String(new Date(+yr,tm,0).getDate()).padStart(2,"0");}}
const isIn=/입금|들어온|들어왔|받은/.test(q),isOut=/출금|나간|나갔|쓴|결제|빠져/.test(q),nk=exKw(orig);
if(/누가|많이|순위|top|랭킹|많은/.test(q))return rankAns(fd,td,isOut);
const isCnt=/몇 건|몇건|건수|횟수|몇 번|몇번/.test(q);
if(nk)return nameAns(nk,fd,td,isIn,isOut,isCnt);
if(fd||isIn||isOut)return rngAns(fd,td,isIn,isOut,isCnt);
if(/전체|총|합계|총액/.test(q))return totAns(isIn,isOut);
const recm=q.match(/최근\s*(\d+)\s*건/);if(recm)return recAns(+recm[1],isIn,isOut);
return "잘 못 알아들었어요 😅<br>• <b>3월 입금 총액</b><br>• <b>홍길동 거래 내역</b><br>• <b>누가 제일 많이 입금했어?</b><br>• <b>현재 잔액</b>";}
function flt(fd,td,isIn,isOut,nk){return allData.filter(d=>{if(fd&&d.dateOnly<fd)return false;if(td&&d.dateOnly>td)return false;if(isIn&&d.in===0)return false;if(isOut&&d.out===0)return false;if(nk&&!(d.name+" "+d.desc+" "+d.bank).toLowerCase().includes(nk.toLowerCase()))return false;return true;});}
function rngAns(fd,td,isIn,isOut,isCnt){const d=flt(fd,td,isIn,isOut,null);if(!d.length)return "해당 조건 거래 없어요 😅";const ti=d.reduce((s,x)=>s+x.in,0),to=d.reduce((s,x)=>s+x.out,0),ci=d.filter(x=>x.in>0).length,co=d.filter(x=>x.out>0).length,p=fd&&td?"<b>"+fd+" ~ "+td+"</b>":"전체";if(isIn&&!isOut){if(isCnt)return p+"<br>입금 건수: <b>"+ci+"건</b>";return p+" 입금<br><span class='amt-in'>"+fmtN(ti)+"</span> ("+ci+"건)";}if(isOut&&!isIn){if(isCnt)return p+"<br>출금 건수: <b>"+co+"건</b>";return p+" 출금<br><span class='amt-out'>"+fmtN(to)+"</span> ("+co+"건)";}const net=ti-to;return p+"<br>입금 <span class='amt-in'>"+fmtN(ti)+"</span> ("+ci+"건)<br>출금 <span class='amt-out'>"+fmtN(to)+"</span> ("+co+"건)<br>순입금 <span class='amt'>"+(net>=0?"+":"")+fmtN(net)+"</span>";}
function nameAns(kw,fd,td,isIn,isOut,isCnt){const d=flt(fd,td,isIn,isOut,kw);if(!d.length)return "<b>"+kw+"</b> 거래 없어요.";const ti=d.reduce((s,x)=>s+x.in,0),to=d.reduce((s,x)=>s+x.out,0),ci=d.filter(x=>x.in>0).length,co=d.filter(x=>x.out>0).length;let r="<b>\""+kw+"\"</b> 거래<br>";if(ti>0)r+="입금 <span class='amt-in'>"+fmtN(ti)+"</span> ("+ci+"건)<br>";if(to>0)r+="출금 <span class='amt-out'>"+fmtN(to)+"</span> ("+co+"건)<br>";if(d.length<=5)r+="<table>"+d.map(x=>"<tr><td>"+x.dateOnly+"</td><td>"+(x.name||x.desc)+"</td><td>"+(x.in>0?"<span class='amt-in'>+"+fmtN(x.in)+"</span>":"<span class='amt-out'>-"+fmtN(x.out)+"</span>")+"</td></tr>").join("")+"</table>";return r;}
function rankAns(fd,td,isOut){const d=flt(fd,td,!isOut,isOut,null),m={};d.forEach(x=>{const k=x.name||x.desc||"(미상)";if(!m[k])m[k]={in:0,out:0,cnt:0};m[k].in+=x.in;m[k].out+=x.out;m[k].cnt++;});const s=Object.entries(m).map(([k,v])=>({name:k,amt:isOut?v.out:v.in,cnt:v.cnt})).filter(x=>x.amt>0).sort((a,b)=>b.amt-a.amt).slice(0,5);if(!s.length)return "해당 기간 거래 없어요.";const p=fd&&td?"<b>"+fd+" ~ "+td+"</b> ":"",t=isOut?"출금":"입금";let r=p+t+" TOP "+s.length+"<br><table>";s.forEach((x,i)=>{r+="<tr><td><b>"+(i+1)+"</b></td><td>"+x.name+"</td><td><span class='"+(isOut?"amt-out":"amt-in")+"'>"+ fmtN(x.amt)+"</span></td><td style='color:var(--text3)'>"+x.cnt+"건</td></tr>";});return r+"</table>";}
function totAns(isIn,isOut){const ti=allData.reduce((s,d)=>s+d.in,0),to=allData.reduce((s,d)=>s+d.out,0),ci=allData.filter(d=>d.in>0).length,co=allData.filter(d=>d.out>0).length,net=ti-to;if(isIn&&!isOut)return "전체 입금<br><span class='amt-in'>"+fmtN(ti)+"</span> ("+ci+"건)";if(isOut&&!isIn)return "전체 출금<br><span class='amt-out'>"+fmtN(to)+"</span> ("+co+"건)";return "전체 요약<br>입금 <span class='amt-in'>"+fmtN(ti)+"</span> ("+ci+"건)<br>출금 <span class='amt-out'>"+fmtN(to)+"</span> ("+co+"건)<br>순입금 <span class='amt'>"+(net>=0?"+":"")+fmtN(net)+"</span>";}
function recAns(n,isIn,isOut){let d=[...allData];if(isIn)d=d.filter(x=>x.in>0);if(isOut)d=d.filter(x=>x.out>0);const s=d.slice(-n);if(!s.length)return "해당 거래 없어요.";let r="최근 "+n+"건<br><table>";s.reverse().forEach(x=>{r+="<tr><td>"+x.dateOnly+"</td><td>"+(x.name||x.desc)+"</td><td>"+(x.in>0?"<span class='amt-in'>+"+fmtN(x.in)+"</span>":"<span class='amt-out'>-"+fmtN(x.out)+"</span>")+"</td></tr>";});return r+"</table>";}
function exKw(orig){const sw=["입금","출금","얼마","총액","합계","내역","거래","조회","보여","주세요","이야","이에요","부터","까지","기간","전체","이번","지난","달","월","일","건수","몇","누가","제일","많이","순위","랭킹","현재","잔액","최근","보여줘","알려줘","뭐야","어때"];let ws=orig.replace(/[0-9\-~\/]/g," ").split(/[\s,]+/).filter(w=>w.length>=2);ws=ws.filter(w=>!sw.some(s=>w.includes(s)));ws=ws.filter(w=>/[가-힣]/.test(w));return ws[0]||null;}
</script>
</body></html>
